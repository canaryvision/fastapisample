<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Sample FastAPI{% endblock %}</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #0b1020;
        color: #e9eefc;
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 14px;
        padding: 22px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { margin: 0 0 16px; opacity: 0.9; }
      label { display: block; font-size: 13px; margin: 12px 0 6px; opacity: 0.9; }
      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(0, 0, 0, 0.25);
        color: inherit;
        outline: none;
      }
      input:focus { border-color: rgba(120, 170, 255, 0.7); }
      button {
        margin-top: 16px;
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 0;
        background: #3b82f6;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      .hint { font-size: 12px; opacity: 0.8; margin-top: 12px; }
      .error {
        margin: 10px 0 0;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 120, 120, 0.35);
        background: rgba(255, 90, 90, 0.12);
        color: #ffd0d0;
        font-size: 13px;
      }
      a { color: #93c5fd; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        {% block content %}{% endblock %}
      </div>
    </div>
  </body>
</html>
